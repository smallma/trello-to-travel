<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trello → 旅行社行程表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FAFAF7] text-gray-800 font-sans">

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="font-serif text-lg text-[#2D5A4E]">📋 我的行程</h1>
        <label class="sidebar-upload">
          + 新增
          <input id="file-input" type="file" accept=".json,application/json" hidden>
        </label>
      </div>
      <div class="sidebar-empty" id="sidebar-empty">
        尚未匯入<br>點「+ 新增」上傳 Trello JSON
      </div>
      <ul class="board-list" id="board-list"></ul>
      <div class="sidebar-footer">
        <small>資料同步至後端，多裝置共用。</small>
        <button id="reset-password" class="link-btn" title="登出 / 換密碼">重設密碼</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="main-header">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="開關側欄">☰</button>
        <h2 id="trip-title" class="font-serif text-2xl text-[#2D5A4E]">Trello → 旅行社行程表</h2>
      </header>

      <div id="banner" class="banner hidden"></div>

      <section id="toolbar" class="toolbar hidden">
        <button id="expand-all">全部展開</button>
        <button id="collapse-all">全部收合</button>
        <button id="edit-route-toggle" title="開關後可勾選每張卡片是否加入地圖路線">☑ 編輯路線</button>
        <div class="toolbar-right">
          <label class="check-inline">
            <input id="include-extras" type="checkbox" checked>
            包含補充資訊
          </label>
          <button id="copy-json" class="primary">複製為 JSON</button>
        </div>
      </section>

      <section id="content" class="content">
        <div class="empty-hint">
          <p class="text-lg">👈 從左側 <strong>+ 新增</strong> 上傳一份 Trello 匯出的 JSON</p>
          <p class="text-sm mt-2 text-gray-500">資料全部在你的瀏覽器解析，<strong>不會上傳到任何地方</strong>。</p>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full text-sm shadow-lg z-50"></div>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-box" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3>⚙️ 行程設定</h3>
        <button id="st-close" class="modal-close" title="關閉">×</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">行程名稱</label>
        <input id="st-name" type="text" class="modal-input" maxlength="100">

        <label class="modal-label">AI 導遊偏好 <span class="modal-hint">（會影響每張卡片的 AI 介紹角度）</span></label>
        <textarea id="st-pref" rows="3" class="modal-input" placeholder="例：我們是 4 個朋友自由行，喜歡歷史與美食、不愛奢侈品購物"></textarea>

        <label class="modal-label">已隱藏的卡片</label>
        <div id="st-hidden-list" class="modal-list"></div>

        <div class="modal-actions">
          <button id="st-clear-cache" class="danger-soft">清除 AI 快取</button>
          <span id="st-status" class="modal-status"></span>
          <button id="st-save" class="primary">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
