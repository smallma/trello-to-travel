<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trello → 旅行社行程表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FAFAF7] text-gray-800 font-sans">

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="font-serif text-lg text-[#2D5A4E]">📋 我的行程</h1>
        <div class="sidebar-add">
          <button id="sidebar-add-btn" class="sidebar-upload" title="新增行程">+ 新增</button>
          <div id="sidebar-add-menu" class="sidebar-add-menu hidden">
            <label class="sidebar-add-item">
              📂 上傳 Trello JSON
              <input id="file-input" type="file" accept=".json,application/json" hidden>
            </label>
            <button id="sidebar-add-blank" class="sidebar-add-item">📝 建立空白行程</button>
          </div>
        </div>
      </div>
      <div class="sidebar-empty" id="sidebar-empty">
        尚未匯入<br>點「+ 新增」上傳 Trello JSON
      </div>
      <ul class="board-list" id="board-list"></ul>
      <div class="sidebar-footer">
        <small>資料同步至後端，多裝置共用。</small>
        <button id="reset-password" class="link-btn" title="登出 / 換密碼">重設密碼</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="main-header">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="開關側欄">☰</button>
        <h2 id="trip-title" class="font-serif text-2xl text-[#2D5A4E]">Trello → 旅行社行程表</h2>
      </header>

      <div id="banner" class="banner hidden"></div>

      <section id="toolbar" class="toolbar hidden">
        <button id="expand-all">全部展開</button>
        <button id="collapse-all">全部收合</button>
        <button id="edit-route-toggle" title="開關後可勾選每張卡片是否加入地圖路線">☑ 編輯路線</button>
        <div class="toolbar-right">
          <label class="check-inline">
            <input id="include-extras" type="checkbox" checked>
            包含補充資訊
          </label>
          <button id="copy-json" class="primary">複製為 JSON</button>
          <button id="export-board" title="匯出這份行程為 ZIP">📦 匯出</button>
          <label class="upload-import" title="匯入 ZIP 行程（自動換新 ID）">
            ⬇ 匯入
            <input id="import-file" type="file" accept=".zip" hidden>
          </label>
        </div>
      </section>

      <section id="content" class="content">
        <div class="empty-hint">
          <p class="text-lg">👈 從左側 <strong>+ 新增</strong> 上傳一份 Trello 匯出的 JSON</p>
          <p class="text-sm mt-2 text-gray-500">資料全部在你的瀏覽器解析，<strong>不會上傳到任何地方</strong>。</p>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-2.5 rounded-full text-sm shadow-lg z-50"></div>

  <div id="top-progress" class="hidden"></div>
  <div id="loading-overlay" class="hidden">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <div id="loading-msg" class="loading-msg">載入中…</div>
    </div>
  </div>

  <!-- Item editor modal -->
  <div id="item-modal" class="modal-overlay hidden">
    <div class="modal-box" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 id="it-h">✏️ 編輯行程</h3>
        <span id="it-title" class="muted"></span>
        <button id="it-close" class="modal-close" title="關閉">×</button>
      </div>
      <div class="modal-body">
        <form id="it-form" onsubmit="event.preventDefault()">
          <label class="modal-label">標題 *</label>
          <input id="it-fld-title" class="modal-input" required>

          <label class="modal-label">類型</label>
          <select id="it-fld-category" class="modal-input">
            <option value="sight" selected>🏛️ 景點</option>
            <option value="food">🍽️ 餐廳</option>
            <option value="hotel">🏨 住宿</option>
            <option value="transit">🚆 交通</option>
            <option value="shop">🛍️ 購物</option>
            <option value="ticket">🎫 票券</option>
          </select>

          <div class="modal-row">
            <div style="flex:1">
              <label class="modal-label">開始時間 <span class="modal-hint">HH:MM</span></label>
              <input id="it-fld-time-start" class="modal-input" placeholder="例 09:30">
            </div>
            <div style="flex:1">
              <label class="modal-label">結束時間 <span class="modal-hint">HH:MM（可空）</span></label>
              <input id="it-fld-time-end" class="modal-input" placeholder="例 12:00">
            </div>
          </div>

          <label class="modal-label">描述 / 備註</label>
          <textarea id="it-fld-desc" class="modal-input" rows="3"></textarea>

          <details class="modal-advanced">
            <summary>進階選項（地點、連結）</summary>
            <label class="modal-label">地點 <span class="modal-hint">留空也可以，地圖會用標題去找；填寫越精確越準</span></label>
            <input id="it-fld-place" class="modal-input" placeholder="例 Stephansdom, Vienna">

            <label class="modal-label">相關連結 <span class="modal-hint">一行一個</span></label>
            <textarea id="it-fld-links" class="modal-input" rows="2" placeholder="https://..."></textarea>

            <input id="it-fld-image" type="hidden">
          </details>

          <label class="modal-label">附件 <span class="modal-hint">圖片自動產縮圖；單檔 10MB；圖片 20 張、檔案 30 個上限。<strong>第一張圖片就是封面</strong>（hover 圖片可改）</span></label>
          <div id="it-dropzone" class="dropzone">
            <p>把檔案拖進來，或 <label class="dz-pick">點此選擇<input type="file" multiple hidden></label></p>
            <div id="it-dz-status" class="dz-status"></div>
          </div>
          <div id="it-attachments" class="attach-list"></div>

          <div class="modal-actions">
            <span id="it-status" class="modal-status"></span>
            <button id="it-save" class="primary">儲存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-box" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3>⚙️ 行程設定</h3>
        <button id="st-close" class="modal-close" title="關閉">×</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">行程名稱</label>
        <input id="st-name" type="text" class="modal-input" maxlength="100">

        <label class="modal-label">AI 導遊偏好 <span class="modal-hint">（會影響每張卡片的 AI 介紹角度）</span></label>
        <textarea id="st-pref" rows="3" class="modal-input" placeholder="例：我們是 4 個朋友自由行，喜歡歷史與美食、不愛奢侈品購物"></textarea>

        <label class="modal-label">已隱藏的卡片</label>
        <div id="st-hidden-list" class="modal-list"></div>

        <div class="modal-actions">
          <button id="st-clear-cache" class="danger-soft">清除 AI 快取</button>
          <span id="st-status" class="modal-status"></span>
          <button id="st-save" class="primary">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
